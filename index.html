<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carioca Pro</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      display: flex;
      justify-content: center;
      padding: 10px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
    }

    h1 { text-align: center; font-size: 20px; }

    input, button {
      width: 100%;
      padding: 8px;
      margin-bottom: 8px;
      border-radius: 8px;
      border: none;
    }

    button { background: #22c55e; color: white; }

    .round { text-align: center; margin-bottom: 10px; }

    .player {
      padding: 8px;
      border-radius: 8px;
      margin-bottom: 6px;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .player-info { flex: 1; }

    .medal { font-size: 18px; margin-right: 5px; }

    .actions {
      display: flex;
      gap: 4px;
    }

    .actions button {
      padding: 5px;
      font-size: 12px;
    }

    /* MODAL */
    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      display: none;
    }

    .modal-content {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      width: 80%;
    }

    .modal button { margin-top: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🃏 Carioca Pro</h1>

    <div class="round" id="roundInfo"></div>

    <input id="playerName" placeholder="Nombre jugador">
    <button onclick="addPlayer()">Agregar jugador</button>

    <button onclick="nextRound()">Siguiente ronda</button>

    <div id="players"></div>
  </div>

  <!-- MODAL -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <div id="modalText"></div>
      <button onclick="closeModal()">OK</button>
    </div>
  </div>

  <script>
    const rounds = [
      "2 tríos",
      "1 trío + 1 escala",
      "2 escalas",
      "3 tríos",
      "2 tríos + 1 escala",
      "1 trío + 2 escalas",
      "3 escalas"
    ];

    let state = JSON.parse(localStorage.getItem('cariocaPro')) || {
      players: [], round: 0
    };

    function save() {
      localStorage.setItem('cariocaPro', JSON.stringify(state));
    }

    function showModal(text) {
      document.getElementById('modalText').innerText = text;
      document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    function render() {
      const container = document.getElementById('players');
      const roundInfo = document.getElementById('roundInfo');

      container.innerHTML = '';
      roundInfo.innerText = `Ronda ${state.round+1}: ${rounds[state.round] || 'Fin'}`;

      const sorted = [...state.players].sort((a,b)=>a.score-b.score);

      sorted.forEach((p, index) => {
        let medal = '';
        if (index === 0) medal = '🥇';
        else if (index === 1) medal = '🥈';
        else if (index === 2) medal = '🥉';

        const div = document.createElement('div');
        div.className = 'player';
        div.style.background = p.color;

        div.innerHTML = `
          <div class="player-info">
            <span class="medal">${medal}</span>
            <strong>${p.name}</strong><br>
            ${p.score} pts
          </div>
          <div class="actions">
            <button onclick="addScore(${state.players.indexOf(p)})">+</button>
            <button onclick="resetScore(${state.players.indexOf(p)})">x</button>
          </div>
        `;

        container.appendChild(div);
      });
    }

    function randomColor() {
      const colors = ['#334155','#1d4ed8','#065f46','#7c2d12','#581c87','#0f766e'];
      return colors[Math.floor(Math.random()*colors.length)];
    }

    function addPlayer() {
      const name = document.getElementById('playerName').value.trim();
      if (!name) return showModal('Ingresa un nombre');

      state.players.push({ name, score: 0, color: randomColor() });
      document.getElementById('playerName').value = '';

      save(); render();
    }

    function addScore(index) {
      const points = parseInt(prompt('Puntos de la ronda'));
      if (isNaN(points)) return showModal('Valor inválido');

      state.players[index].score += points;
      save(); render();
    }

    function resetScore(index) {
      if (confirm('¿Resetear?')) {
        state.players[index].score = 0;
        save(); render();
      }
    }

    function nextRound() {
      state.round++;
      showModal('Nueva ronda: ' + (rounds[state.round] || 'Fin del juego'));
      save(); render();
    }

    render();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
